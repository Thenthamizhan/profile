# Render blueprint for the SahaHR API (Docker). The Next.js web app deploys to Vercel, NOT here.
# Database is Neon (external) — not provisioned by Render.
#
# Secrets (sync:false) are entered in the Render dashboard, never committed:
#   - ConnectionStrings__Default   : Neon app-role conn (sahahr_app) — DIRECT endpoint, SSL Mode=Require
#   - ConnectionStrings__Migrator  : Neon owner-role conn (migrations / RLS-exempt work)
#   - Jwt__SigningKey              : >=32-char random secret (HS256)
#
# After first deploy: run migrations once against Neon (see DEPLOY.md) —
#   node scripts/migrate/run.mjs up "<owner conn>"
# Render does not auto-migrate; schema changes are applied out-of-band by design.

services:
  - type: web
    name: sahahr-api
    runtime: docker
    repo: https://github.com/mvshashni/sahahr
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .            # build from repo root so the .sln + module projects resolve
    plan: starter               # free tier sleeps; starter avoids cold starts for a demo
    region: singapore           # match the Neon region (ap-southeast-1) to cut latency
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # PORT is injected by Render automatically; Program.cs binds 0.0.0.0:$PORT.
      - key: ConnectionStrings__Default
        sync: false
      - key: ConnectionStrings__Migrator
        sync: false
      - key: Jwt__Issuer
        value: https://sahahr-api.onrender.com
      - key: Jwt__Audience
        value: sahahr-api
      - key: Jwt__SigningKey
        sync: false

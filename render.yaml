# Render Blueprint (render.yaml) for the SahaHR API (Docker). Deploy: Render dashboard →
# "New +" → "Blueprint" → pick this repo; Render reads this file. The Next.js web app deploys to
# Vercel (NOT here); the database is Neon (external, NOT provisioned by Render).
#
# Secrets entered in the dashboard (sync:false — never committed). Shapes: apps/api/.env.production.example
#   - ConnectionStrings__Default   : Neon app-role conn (sahahr_app) — DIRECT endpoint, SSL Mode=Require
#   - ConnectionStrings__Migrator  : Neon owner-role conn (migrations / RLS-exempt work)
#   - Jwt__SigningKey              : >=32-char random secret (HS256). MUST be sync:false (a known
#       value), NOT Render's generateValue — see the "demo token" note below.
#   - Encryption__DataKey          : base64-encoded 32-byte AES-256 key for PII-at-rest (§8.3).
#       REQUIRED — the API fails fast at startup without it. Generate: openssl rand -base64 32
#
# Migrations: Render does NOT auto-migrate (the .NET runtime image has neither Node nor psql, so the
# Node migration runner can't run as a preDeployCommand). Neon is already at 0005; apply future
# migrations out-of-band from a workstation:  node scripts/migrate/run.mjs up "<owner conn>"
#
# Demo token note: in Production the /v1/dev/token endpoint is disabled (404) and no real IdP is
# wired yet (see DEPLOY.md "Production gates"). To exercise the deployed API you must mint a JWT
# signed with the SAME Jwt__SigningKey set here — which is why it is a KNOWN secret (sync:false),
# not an opaque generated one.

services:
  - type: web
    name: sahahr-api
    runtime: docker
    repo: https://github.com/mvshashni/sahahr
    branch: main
    autoDeploy: true            # deploy on push to main (CI gates the branch first)
    numInstances: 1             # IMPORTANT: the OutboxDispatcher + NotificationDeliveryWorker are
                                # in-process singletons; >1 instance would double-process the outbox.
                                # Scale horizontally only after moving relays to a leased/locked worker.
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .            # build from repo root so the .sln + module projects resolve
    plan: starter               # free tier sleeps (~50s cold start — looks broken in a demo); starter avoids it
    region: singapore           # match the Neon region (ap-southeast-1) to cut latency
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # PORT is injected by Render automatically; Program.cs binds 0.0.0.0:$PORT.
      - key: ConnectionStrings__Default
        sync: false
      - key: ConnectionStrings__Migrator
        sync: false
      - key: Jwt__Issuer
        value: https://sahahr-api.onrender.com   # update to your actual Render URL after first deploy
      - key: Jwt__Audience
        value: sahahr-api
      - key: Jwt__SigningKey
        sync: false
      - key: Encryption__DataKey   # base64 32-byte AES key (PII at rest, §8.3). REQUIRED — see header.
        sync: false
